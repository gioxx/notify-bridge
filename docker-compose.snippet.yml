# ── notify-bridge (Resend backend) ───────────────────────────────────────────
# Add this block to your existing docker-compose.yml,
# inside the "services:" section.
#
# The default internal port is 5001 to avoid conflicts with
# changedetection.io, which uses 5000. The bridge does not expose
# any host port: it is reachable only by other containers on the
# same Docker network.
# ─────────────────────────────────────────────────────────────────────────────

  notify-bridge:
    build: ./notify-bridge
    restart: unless-stopped
    environment:
      BRIDGE_TOKEN:    "${BRIDGE_TOKEN}"           # revocable token, set it in .env
      BRIDGE_PORT:     "${BRIDGE_PORT:-5001}"      # internal port (default 5001, not exposed on the host)
      RESEND_API_KEY:  "${RESEND_API_KEY}"         # re_xxxxxxxxxxxx
      MAIL_FROM:       "${MAIL_FROM}"              # e.g. notify@yourdomain.com (verified in Resend)
      MAIL_FROM_NAME:  "${MAIL_FROM_NAME:-ChangeDetection}"
      MAIL_TO:         "${MAIL_TO}"                # e.g. "you@email.com,other@email.com"
    # ── Network ───────────────────────────────────────────────────────────────
    # CASE A - your compose does NOT have an explicit "networks:" block:
    #   Docker Compose puts all services on the same default network.
    #   No extra configuration is needed: remove or comment out the networks block below.
    #
    # CASE B - your compose DOES have an explicit "networks:" block (e.g. changedetection_net):
    #   Uncomment the following lines and use the network name already declared.
    #
    # networks:
    #   - changedetection_net
    healthcheck:
      test: ["CMD", "sh", "-c",
             "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:' + __import__('os').environ.get('BRIDGE_PORT','5001') + '/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3

# ── .env (DO NOT commit this file) ───────────────────────────────────────────
# Create a .env file in the same folder as docker-compose.yml:
#
# BRIDGE_TOKEN=replace_this_with_a_random_token
# BRIDGE_PORT=5001                        # optional, change only if 5001 is already in use
# RESEND_API_KEY=re_xxxxxxxxxxxxxxxxxxxx
# MAIL_FROM=notify@tuodominio.com
# MAIL_FROM_NAME=ChangeDetection
# MAIL_TO=destinatario@email.com
#
# Generate a secure token with:
#   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
# ─────────────────────────────────────────────────────────────────────────────
